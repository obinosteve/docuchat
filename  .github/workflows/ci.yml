name: DocuChat CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: file:./test.db
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: file:./test.db
          JWT_ACCESS_SECRET: ci-access-secret-at-least-thirty-two-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-thirty-two-characters
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
